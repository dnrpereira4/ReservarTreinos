<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Administração</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Administração</h1>

  <button onclick="window.location.href='index.html'">
    Voltar às Reservas
  </button>

  <h2>Criar Utilizador</h2>

  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password">

  <select id="role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>

  <input
    id="sessions"
    type="number"
    min="1"
    value="1"
    placeholder="Sessões por semana">

  <button onclick="createUser()">
    Criar
  </button>

  <hr>

  <h2>Utilizadores</h2>
    <table id="usersTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Password</th>
        <th>Role</th>
        <th>Sessões</th>
        <th>Ações</th>
      </tr>
    </thead>
      
  
    <tbody></tbody>
  </table>

  <hr>

  <h2>Reservas</h2>
<div class="table-container">
<table id="reservationsTable">

  <thead>
    <tr>
      <th>Data</th>
      <th>Hora</th>
      <th>Utilizador</th>
      <th>Ações</th>
    </tr>
  </thead>

  <tbody></tbody>

</table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="admin.js"></script>

</body>
</html>
